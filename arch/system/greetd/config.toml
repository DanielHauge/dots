[terminal]
vt = 1
switch = true

[default_session]
command = "tuigreet --issue --time --remember --remember-session --sessions /usr/share/wayland-sessions --cmd Hyprland --width 80 --greet-align center --asterisks --theme 'container=black;border=cyan;title=cyan;text=gray;time=yellow;greet=cyan;prompt=green;input=cyan;action=gray;button=yellow' --power-shutdown 'systemctl poweroff' --power-reboot 'systemctl reboot'"
user = "greeter"
